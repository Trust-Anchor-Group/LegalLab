<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Balance scales icon centered -->
  <!-- Pole -->
  <rect x="244" y="80" width="24" height="200" rx="5" fill="#e8c84a"/>
  <!-- Top pivot -->
  <circle cx="256" cy="76" r="18" fill="#e8c84a"/>
  <!-- Horizontal bar -->
  <rect x="110" y="126" width="292" height="16" rx="8" fill="#e8c84a"/>
  <!-- Left chain -->
  <line x1="148" y1="142" x2="148" y2="182" stroke="#e8c84a" stroke-width="5" stroke-linecap="round"/>
  <!-- Left pan -->
  <ellipse cx="148" cy="198" rx="46" ry="13" fill="none" stroke="#e8c84a" stroke-width="5"/>
  <path d="M102 192 Q148 216 194 192" fill="none" stroke="#e8c84a" stroke-width="5" stroke-linecap="round"/>
  <!-- Right chain -->
  <line x1="364" y1="142" x2="364" y2="182" stroke="#e8c84a" stroke-width="5" stroke-linecap="round"/>
  <!-- Right pan -->
  <ellipse cx="364" cy="198" rx="46" ry="13" fill="none" stroke="#e8c84a" stroke-width="5"/>
  <path d="M318 192 Q364 216 410 192" fill="none" stroke="#e8c84a" stroke-width="5" stroke-linecap="round"/>
  <!-- Base -->
  <rect x="210" y="278" width="92" height="12" rx="6" fill="#e8c84a"/>
  <rect x="188" y="288" width="136" height="12" rx="6" fill="#e8c84a"/>
  <!-- App name -->
  <text x="256" y="360" font-family="sans-serif" font-size="52" font-weight="bold"
        text-anchor="middle" fill="#e8c84a" letter-spacing="2">Legal</text>
  <text x="256" y="415" font-family="sans-serif" font-size="52" font-weight="bold"
        text-anchor="middle" fill="#4ab8e8" letter-spacing="2">Lab</text>
</svg>
